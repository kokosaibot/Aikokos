<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>AI Video Order</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
body {
  background:#0f172a;
  color:#fff;
  font-family:Arial;
  padding:20px;
}
.card {
  background:#1e293b;
  padding:16px;
  border-radius:12px;
  margin-bottom:16px;
}
button {
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  font-size:16px;
  background:#22c55e;
  color:black;
}
input {
  margin-top:10px;
}
</style>
</head>
<body>

<h2>🎬 Заказ AI Видео</h2>

<div class="card">
  <b>Выбери шаблон</b><br><br>
  <button onclick="select('Realistic Video')">Realistic · $25</button>
  <button onclick="select('Pro Cinematic')">Pro · $50</button>
</div>

<div class="card">
  <b>Загрузи фото (1–3)</b><br>
  <input type="file" accept="image/*" multiple>
</div>

<button onclick="sendOrder()">Отправить заказ</button>

<script>
const tg = window.Telegram.WebApp;
tg.ready();

let product = "";

function select(name) {
  product = name;
  tg.showAlert("Вы выбрали: " + name);
}

function sendOrder() {
  if (!product) {
    tg.showAlert("Выберите шаблон");
    return;
  }

  const user = tg.initDataUnsafe.user;

  const data = {
    user_id: user.id,
    name: user.first_name,
    product: product
  };

  tg.sendData(JSON.stringify(data));
  tg.showAlert("Заказ отправлен. Админ свяжется с вами.");
}
</script>

</body>
</html>
