<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Mini App</title>
  <link rel="stylesheet" href="./style.css" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <div class="app">
    <header class="hero">
      <div class="badge">Telegram Mini App</div>
      <h1>AI Tools</h1>
      <p>Простая база под image, video и enhance.</p>
    </header>

    <section class="cards">
      <button class="card" onclick="showScreen('image')">
        <h2>Generate Image</h2>
        <p>Prompt + Nano Banana 2 / Pro</p>
      </button>

      <button class="card" onclick="showScreen('video')">
        <h2>Animate Photo</h2>
        <p>Prompt + reference photo</p>
      </button>

      <button class="card" onclick="showScreen('enhance')">
        <h2>Enhance Quality</h2>
        <p>Upload image + progress %</p>
      </button>
    </section>

    <section id="image" class="screen hidden">
      <h3>Generate Image</h3>
      <textarea id="imagePrompt" placeholder="Напиши prompt для изображения..."></textarea>
      <select id="imageModel">
        <option>Nano Banana 2</option>
        <option>Nano Banana Pro</option>
      </select>
      <button class="main-btn" onclick="generateImage()">Generate</button>
      <div id="imageResult" class="result-box">Результат будет здесь</div>
    </section>

    <section id="video" class="screen hidden">
      <h3>Animate Photo</h3>
      <textarea id="videoPrompt" placeholder="Напиши prompt для анимации..."></textarea>
      <input id="videoFile" type="file" accept="image/*" />
      <button class="main-btn" onclick="animatePhoto()">Animate</button>
      <div id="videoResult" class="result-box">Результат будет здесь</div>
    </section>

    <section id="enhance" class="screen hidden">
      <h3>Enhance Quality</h3>
      <input id="enhanceFile" type="file" accept="image/*" />
      <button class="main-btn" onclick="startEnhance()">Enhance</button>

      <div class="progress-wrap">
        <div class="progress-bar">
          <div id="progressFill" class="progress-fill"></div>
        </div>
        <div class="progress-row">
          <span id="progressPercent">0%</span>
          <span id="progressStatus">Ожидание</span>
        </div>
      </div>
    </section>
  </div>

  <script src="./app.js"></script>
</body>
</html>
